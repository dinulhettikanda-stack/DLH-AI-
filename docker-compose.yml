version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: dlh-ai-postgres
    environment:
      POSTGRES_USER: dlh_user
      POSTGRES_PASSWORD: dlh_password
      POSTGRES_DB: dlh_ai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dlh-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dlh_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: dlh-ai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dlh-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dlh-ai-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://dlh_user:dlh_password@postgres:5432/dlh_ai_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET_KEY: your-secret-key-change-in-production
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - dlh-network

  # React Web
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: dlh-ai-web
    command: npm run dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./web:/app
      - /app/node_modules
    networks:
      - dlh-network

volumes:
  postgres_data:
  redis_data:

networks:
  dlh-network:
    driver: bridge